version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: liubai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liubai
      POSTGRES_USER: liubai
      POSTGRES_PASSWORD: liubai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
